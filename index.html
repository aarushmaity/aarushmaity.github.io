<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarush — College Application Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: #E2DDD5;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #A39D96;
    --accent: #1A1714;

    --ca: #FBEAF0; --ca-t: #72243E; --ca-b: #D4537E;
    --gt: #FAEEDA; --gt-t: #633806; --gt-b: #B8860B;
    --ui: #E6F1FB; --ui-t: #0C447C; --ui-b: #1D4ED8;
    --pu: #FEF6E0; --pu-t: #6B4A00; --pu-b: #B07D00;
    --mn: #EEEDFE; --mn-t: #3C3489; --mn-b: #7C3AED;
    --wi: #E1F5EE; --wi-t: #085041; --wi-b: #065F46;
    --mi: #EAF3DE; --mi-t: #27500A; --mi-b: #1E3A5F;
    --co: #E8EEF8; --co-t: #1A2F6B; --co-b: #1E3A8A;
    --mt: #FDF0F0; --mt-t: #7A1010; --mt-b: #A32D2D;
    --vf: #E1F5EE; --vf-t: #085041; --vf-b: #0F6E56;
    --de: #EEEDFE; --de-t: #3C3489; --de-b: #534AB7;
    --re: #FBEAF0; --re-t: #72243E; --re-b: #D4537E;
    --rc: #FAECE7; --rc-t: #712B13; --rc-b: #D85A30;
    --te: #E6F1FB; --te-t: #0C447C; --te-b: #378ADD;
    --ts: #FAEEDA; --ts-t: #633806; --ts-b: #BA7517;
    --fa: #EAF3DE; --fa-t: #27500A; --fa-b: #639922;
    --sr: #FAECE7; --sr-t: #712B13; --sr-b: #993C1D;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.6;
  }

  header {
    background: var(--text);
    color: var(--bg);
    padding: 2rem 2.5rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #000;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
    font-style: italic;
  }

  header h1 span {
    font-style: normal;
    font-weight: 500;
    opacity: 0.5;
    font-size: 14px;
    margin-left: 8px;
  }

  .tabs {
    display: flex;
    gap: 0;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    overflow: hidden;
    width: fit-content;
  }

  .tab-btn {
    background: transparent;
    border: none;
    color: rgba(247,245,240,0.5);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    border-right: 1px solid rgba(255,255,255,0.2);
  }

  .tab-btn:last-child { border-right: none; }

  .tab-btn.active {
    background: rgba(255,255,255,0.15);
    color: var(--bg);
  }

  .tab-btn:hover:not(.active) {
    background: rgba(255,255,255,0.08);
    color: rgba(247,245,240,0.8);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .main { padding: 2rem 2.5rem; }

  .tab-layout {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 0 1.75rem;
    align-items: start;
  }

  #tab-overall .sidebar {
    top: calc(var(--header-h, 110px) + var(--row1-overall-h, 70px) + 1rem);
  }

  #tab-essays .sidebar {
    top: calc(var(--header-h, 110px) + var(--row1-essay-h, 70px) + 1rem);
  }

  .sidebar {
    position: sticky;
    padding-top: 0;
    opacity: 0;
    transform: translateX(28px);
    pointer-events: none;
    transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.2, 0, 0, 1);
  }

  .sidebar.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  .sidebar-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .sidebar-hdr {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .sidebar-card:last-child { border-bottom: none; }

  .sidebar-card .sc-label {
    color: var(--text2);
    font-size: 11px;
  }

  .sidebar-card .sc-num {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 0;
    overflow: hidden;
  }

  @media (max-width: 900px) {
    .tab-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }


  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .toolbar-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
  }

  .filter-btn:hover { border-color: var(--text3); color: var(--text); }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .stats-row-wrap {
    position: sticky;
    top: var(--header-h, 110px);
    z-index: 90;
    background: var(--bg);
    padding: 10px 0 8px;
    margin: -10px 0 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
  }

  .stats-row-2 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 8px;
    margin-bottom: 1.75rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .stat-card .n {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 2px;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .stat-card .l {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .phase-block { margin-bottom: 2.5rem; }

  .phase-hdr {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    padding: 8px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .phase-hdr::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }

  .day-row {
    display: flex;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }

  .day-row:last-child { border-bottom: none; }

  .day-lbl {
    min-width: 100px;
    flex-shrink: 0;
    padding-top: 3px;
  }

  .day-lbl .dow {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
  }

  .day-lbl .date-str {
    font-size: 11px;
    color: var(--text3);
  }

  .day-lbl.wknd .dow { color: var(--text3); }

  .tasks-col {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: flex-start;
  }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    line-height: 1.5;
    display: inline-block;
  }

  .chip.deadline { outline: 1.5px solid #E24B4A; }
  .chip.milestone { outline: 1.5px solid #1D9E75; }

  .chip-ca { background: var(--ca); color: var(--ca-t); }
  .chip-gt { background: var(--gt); color: var(--gt-t); }
  .chip-ui { background: var(--ui); color: var(--ui-t); }
  .chip-pu { background: var(--pu); color: var(--pu-t); }
  .chip-mn { background: var(--mn); color: var(--mn-t); }
  .chip-wi { background: var(--wi); color: var(--wi-t); }
  .chip-mi { background: var(--mi); color: var(--mi-t); }
  .chip-co { background: var(--co); color: var(--co-t); }
  .chip-mt { background: var(--mt); color: var(--mt-t); }
  .chip-vf { background: var(--vf); color: var(--vf-t); }
  .chip-de { background: var(--de); color: var(--de-t); }
  .chip-re { background: var(--re); color: var(--re-t); }
  .chip-rc { background: var(--rc); color: var(--rc-t); }
  .chip-te { background: var(--te); color: var(--te-t); }
  .chip-ts { background: var(--ts); color: var(--ts-t); }
  .chip-fa { background: var(--fa); color: var(--fa-t); }
  .chip-sr { background: var(--sr); color: var(--sr-t); }
  .chip-buf { background: var(--surface2); color: var(--text3); font-style: italic; }
  .chip-blk { background: var(--surface2); color: var(--text3); }

  .blocked-banner {
    font-size: 11px;
    color: var(--text3);
    font-style: italic;
    padding: 3px 0;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 1.25rem;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .legend-item {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .key-row {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .key-item { display: flex; align-items: center; gap: 6px; }

  .key-box {
    width: 12px; height: 12px; border-radius: 3px;
    display: inline-block;
  }

  .chip.done {
    background: #D4EDDA !important;
    color: #1A5C2A !important;
    outline: none !important;
    text-decoration: line-through;
    opacity: 0.75;
    cursor: pointer;
  }

  .chip.done::before {
    content: '✓ ';
    font-weight: 500;
  }

  .chip:not(.chip-buf):not(.chip-blk) {
    cursor: pointer;
    transition: opacity 0.12s, transform 0.1s;
  }

  .chip:not(.chip-buf):not(.chip-blk):hover {
    opacity: 0.82;
    transform: scale(0.98);
  }

  .progress-bar-wrap {
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
    width: 220px;
  }

  .progress-bar-fill {
    height: 100%;
    background: #5DCAA5;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .progress-label {
    font-size: 11px;
    color: rgba(247,245,240,0.6);
    margin-top: 4px;
    letter-spacing: 0.03em;
  }

  .day-row.today {
    background: #EBF3FF;
    border-radius: 6px;
    padding-left: 8px;
    padding-right: 8px;
    border-bottom: none;
    outline: 1.5px solid #378ADD;
    margin: 2px 0;
  }

  .day-row.today .dow {
    color: #185FA5 !important;
    font-weight: 500;
  }

  .today-badge {
    font-size: 9px;
    font-weight: 500;
    background: #378ADD;
    color: white;
    padding: 1px 6px;
    border-radius: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 3px;
    display: inline-block;
  }

  .day-row.past .day-lbl .dow,
  .day-row.past .day-lbl .date-str {
    color: var(--text3);
  }

  .chip.overdue {
    outline: 1.5px solid #E24B4A !important;
    opacity: 0.9;
  }

  .chip.overdue::before {
    content: '⚠ ';
    font-size: 10px;
  }

  .overdue-count {
    font-size: 11px;
    background: #FCEBEB;
    color: #791F1F;
    border: 1px solid #F09595;
    border-radius: 20px;
    padding: 3px 10px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .stat-card.overdue-card {
    background: #FCEBEB;
    border-color: #F09595;
  }

  .stat-card.overdue-card .n { color: #791F1F; }
  .stat-card.overdue-card .l { color: #A32D2D; }

  .stat-card.done-card {
    background: #E6F7EE;
    border-color: #1D9E75;
  }

  .stat-card.done-card .n { color: #085041; }
  .stat-card.done-card .l { color: #1D9E75; }

  .stat-card.today-card {
    background: #EBF3FF;
    border-color: #378ADD;
  }

  .stat-card.today-card .n { color: #185FA5; }
  .stat-card.today-card .l { color: #378ADD; }

  @keyframes slideOutDown {
    0%   { transform: translateY(0);    opacity: 1; }
    100% { transform: translateY(60%);  opacity: 0; }
  }

  @keyframes slideInDown {
    0%   { transform: translateY(-60%); opacity: 0; }
    100% { transform: translateY(0);    opacity: 1; }
  }

  @keyframes slideOutUp {
    0%   { transform: translateY(0);    opacity: 1; }
    100% { transform: translateY(-60%); opacity: 0; }
  }

  @keyframes slideInUp {
    0%   { transform: translateY(60%);  opacity: 0; }
    100% { transform: translateY(0);    opacity: 1; }
  }

  .num-slot {
    display: inline-block;
    overflow: hidden;
    vertical-align: bottom;
    height: 1.1em;
    position: relative;
  }

  .num-slot-inner {
    display: inline-block;
    line-height: 1.1;
  }

  .num-slot-inner.slide-out-down {
    animation: slideOutDown 0.18s cubic-bezier(0.4,0,1,1) forwards;
  }

  .num-slot-inner.slide-in-down {
    animation: slideInDown 0.2s cubic-bezier(0,0,0.2,1) forwards;
  }

  .num-slot-inner.slide-out-up {
    animation: slideOutUp 0.18s cubic-bezier(0.4,0,1,1) forwards;
  }

  .num-slot-inner.slide-in-up {
    animation: slideInUp 0.2s cubic-bezier(0,0,0.2,1) forwards;
  }

  .cat-warn {
    font-size: 13px;
    margin-left: 7px;
    color: #E24B4A;
    display: inline-block;
    vertical-align: middle;
    position: relative;
    top: -3px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 2rem 0;
  }

  /* ── EDIT CONTEXT MENU ── */
  #ctx-menu {
    position: fixed;
    z-index: 9999;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--border-radius-md);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    min-width: 160px;
    overflow: hidden;
    display: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .ctx-item {
    padding: 9px 14px;
    cursor: pointer;
    color: var(--text2);
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }

  .ctx-item:last-child { border-bottom: none; }
  .ctx-item:hover { background: var(--surface2); color: var(--text); }
  .ctx-item.danger { color: #A32D2D; }
  .ctx-item.danger:hover { background: #FCEBEB; }

  /* ── MODAL ── */
  #edit-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 9998;
    display: none;
    align-items: center;
    justify-content: center;
  }

  #edit-modal-overlay.open { display: flex; }

  #edit-modal {
    background: var(--surface);
    border-radius: var(--border-radius-lg);
    border: 1px solid var(--border);
    padding: 1.5rem;
    width: 380px;
    max-width: 90vw;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  #edit-modal h3 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 1rem;
    color: var(--text);
  }

  .modal-field { margin-bottom: 12px; }
  .modal-field label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  .modal-field input, .modal-field select, .modal-field textarea {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: var(--border-radius-md); font-family: 'DM Mono', monospace;
    font-size: 12px; background: var(--surface); color: var(--text);
  }
  .modal-field textarea { min-height: 60px; resize: vertical; }

  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
  .modal-btn { font-family: 'DM Mono', monospace; font-size: 12px; padding: 7px 16px; border-radius: var(--border-radius-md); cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text2); transition: all 0.12s; }
  .modal-btn:hover { background: var(--surface2); }
  .modal-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .modal-btn.primary:hover { opacity: 0.85; }
  .modal-btn.danger { color: #A32D2D; border-color: #F09595; }
  .modal-btn.danger:hover { background: #FCEBEB; }

  /* ── ADD TASK BUTTON ── */
  .add-task-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 0.5px dashed var(--text3);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.12s;
    margin-left: 4px;
  }

  .day-row:hover .add-task-btn { opacity: 1; }
  .add-task-btn:hover { background: var(--surface2); color: var(--text2); }

  /* syncing indicator */
  #sync-indicator {
    position: fixed;
    bottom: 16px;
    right: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--text);
    color: var(--bg);
    padding: 5px 12px;
    border-radius: 20px;
    z-index: 500;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  #sync-indicator.show { opacity: 1; }

  @media (max-width: 600px) {
    header { padding: 1.25rem 1rem 1rem; }
    .main { padding: 1.25rem 1rem; }
    .day-lbl { min-width: 72px; }
  }
  /* ── SPLASH ── */
  #splash {
    position: fixed;
    inset: 0;
    background: #1A1714;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #splash-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  #splash-canvas-sweep {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }

  #splash-canvas-fade {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 1.1s ease;
  }

  #splash-stage {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 640px;
    padding: 2rem;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* wrapper that holds whichever block is active */
  #splash-content {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
  }

  .sp-block {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    width: 100%;
  }

  .sp-block.active {
    display: flex;
  }

  .sp-label {
    font-family: 'Fraunces', serif;
    font-size: 72px;
    font-weight: 500;
    font-style: italic;
    color: #F7F5F0;
    letter-spacing: -0.03em;
    line-height: 1;
    opacity: 0;
    transform: translateY(14px);
  }

/* ─── SIDEBAR VISIBILITY via IntersectionObserver ─── */
function checkSidebarVisibility(){
  [['overall-stats-row2','#tab-overall .sidebar'],['essay-stats-row2','#tab-essays .sidebar']].forEach(([row2Id, sidebarSel])=>{
    const target = document.getElementById(row2Id);
    const sidebar = document.querySelector(sidebarSel);
    if(!target || !sidebar) return;
    const rect = target.getBoundingClientRect();
    const inView = rect.top > 0 && rect.bottom > 0 && rect.top < window.innerHeight;
    sidebar.style.transition = 'none';
    if(inView){ sidebar.classList.remove('visible'); }
    else { sidebar.classList.add('visible'); }
    requestAnimationFrame(()=>{ sidebar.style.transition = ''; });
  });
}

function setupSidebarObserver(){
  const opts = {
    root: null,
    threshold: 0,
    rootMargin: '-20px 0px 0px 0px'
  };

  function observe(row2Id, sidebarEl){
    const target = document.getElementById(row2Id);
    if(!target || !sidebarEl) return;
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting){
          sidebarEl.classList.remove('visible');
        } else {
          sidebarEl.classList.add('visible');
        }
      });
    }, opts);
    observer.observe(target);
  }

  observe('overall-stats-row2', document.querySelector('#tab-overall .sidebar'));
  observe('essay-stats-row2',   document.querySelector('#tab-essays .sidebar'));
}

/* ─── NUMBER ANIMATION ─── */
function animateNum(id, newVal, warn){
  const node = document.getElementById(id);
  if(!node) return;

  const warnHtml = (warn !== undefined && warn) ? '<span class="cat-warn">⚠</span>' : '';

  const existingSlot = node.querySelector('.num-slot');
  const currentVal = existingSlot
    ? parseInt(existingSlot.querySelector('.num-slot-inner').textContent) || 0
    : parseInt(node.textContent) || 0;

  const currentWarn = node.querySelector('.cat-warn') !== null;
  const warnUnchanged = warn === undefined
    ? true
    : (warn === currentWarn);

  if(currentVal === newVal && warnUnchanged) return;

  const goingUp = newVal > currentVal;
  const outClass = goingUp ? 'slide-out-up' : 'slide-out-down';
  const inClass  = goingUp ? 'slide-in-up'  : 'slide-in-down';

  const slot = document.createElement('span');
  slot.className = 'num-slot';

  const oldInner = document.createElement('span');
  oldInner.className = 'num-slot-inner';
  oldInner.textContent = currentVal;
  slot.appendChild(oldInner);

  node.innerHTML = '';
  node.appendChild(slot);
  if(warnHtml) node.insertAdjacentHTML('beforeend', warnHtml);

  oldInner.classList.add(outClass);

  oldInner.addEventListener('animationend', () => {
    const newInner = document.createElement('span');
    newInner.className = 'num-slot-inner ' + inClass;
    newInner.textContent = newVal;
    slot.innerHTML = '';
    slot.appendChild(newInner);
    newInner.addEventListener('animationend', () => {
      newInner.classList.remove(inClass);
    }, {once:true});
  }, {once:true});
}

/* ─── RENDER ENGINE ─── */
function buildTaskMap(tasks){ const m={}; tasks.forEach(t=>{ if(!m[t.date])m[t.date]=[]; m[t.date].push(t); }); return m; }

function renderCalendar(phases, taskMap, blocked, filterKey, filterVal, calId){
  const cal = document.getElementById(calId);
  cal.innerHTML = '';

  phases.forEach(phase => {
    const ps = pd(phase.start), pe = pd(phase.end);
    const block = document.createElement('div');
    block.className = 'phase-block';
    const hdr = document.createElement('div');
    hdr.className = 'phase-hdr';
    hdr.textContent = phase.name;
    block.appendChild(hdr);

    let cur = new Date(ps);
    while(cur <= pe){
      const d = ds(cur.getFullYear(), cur.getMonth()+1, cur.getDate());
      const dow = DAYS_SHORT[cur.getDay()];
      const isWknd = cur.getDay()===0||cur.getDay()===6;
      const blk = blocked[d];
      const dayTasks = (taskMap[d]||[]).filter(t => filterVal==='all' || t[filterKey]===filterVal);
      const isToday = d === TODAY;
      const isPast = d < TODAY;

      if(filterVal!=='all' && !dayTasks.length && !blk && !isToday){
        cur.setDate(cur.getDate()+1);
        continue;
      }

      const row = document.createElement('div');
      let rowCls = 'day-row';
      if(isToday) rowCls += ' today';
      else if(isPast) rowCls += ' past';
      row.className = rowCls;

      const lbl = document.createElement('div');
      lbl.className = 'day-lbl' + (isWknd?' wknd':'');
      lbl.innerHTML = `<div class="dow">${dow}</div><div class="date-str">${fmtDate(cur)}</div>${isToday?'<span class="today-badge">today</span>':''}`;
      row.appendChild(lbl);

      const tc = document.createElement('div');
      tc.className = 'tasks-col';

      if(blk){
        const b = document.createElement('span');
        b.className = 'blocked-banner';
        b.textContent = '⊘ ' + blk;
        tc.appendChild(b);
      } else if(!dayTasks.length){
        const b = document.createElement('span');
        b.className = 'blocked-banner';
        b.textContent = isWknd ? 'Weekend — rest / buffer' : 'Buffer day — catch up if behind';
        tc.appendChild(b);
      } else {
        dayTasks.forEach(t => {
          const isDone = doneSet.has(t.id);
          const isOverdue = isPast && !isDone;
          const chip = document.createElement('span');
          let cls = 'chip chip-'+t.cls;
          if(isDone){
            cls = 'chip done';
          } else {
            if(isOverdue) cls += ' overdue';
            else if(t.deadline||t.urgent) cls += ' deadline';
            if(t.milestone) cls += ' milestone';
          }
          chip.className = cls;
          chip.dataset.id = t.id;
          chip.title = isDone ? 'Click to mark as not done' : 'Click to mark as done';
          const label = calId==='overall-cal' ? '['+t.track+'] ' : '['+t.school+'] ';
          if(isDone) chip.textContent = label + t.text;
          else if(isOverdue) chip.textContent = label + t.text;
          else chip.textContent = (t.deadline||t.urgent ? '⚑ ' : '') + label + t.text;

          chip.addEventListener('click', ()=>{
            if(doneSet.has(t.id)){ doneSet.delete(t.id); }
            else { doneSet.add(t.id); }
            saveDone(doneSet);
            const isNowDone = doneSet.has(t.id);
            chip.title = isNowDone ? 'Click to mark as not done' : 'Click to mark as done';
            if(isNowDone){
              chip.className = 'chip done';
              chip.textContent = label + t.text;
            } else {
              const nowOverdue = isPast;
              chip.className = 'chip chip-'+t.cls + (nowOverdue?' overdue':(t.deadline||t.urgent?' deadline':'')) + (t.milestone?' milestone':'');
              chip.textContent = (nowOverdue ? '' : (t.deadline||t.urgent ? '⚑ ' : '')) + label + t.text;
            }
            updateGlobalProgress();
            updateOverallDoneCard();
            updateEssayDoneCard();
          });

          tc.appendChild(chip);
        });
      }

      row.appendChild(tc);
      block.appendChild(row);
      cur.setDate(cur.getDate()+1);
    }

    cal.appendChild(block);
  });
}

/* ── OVERRIDES STORE ── */
/* overrides: { removed: Set<taskId>, moved: {taskId: newDate}, added: [task] } */
let overrides = { removed: new Set(), moved: {}, added: [] };

async function sbFetch(path, opts={}){
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=minimal',
    },
    ...opts
  });
  if(opts.method === 'GET' || !opts.method) return res.json();
  return res;
}

async function loadOverrides(){
  if(!SUPABASE_CONFIGURED) return;
  try {
    const rows = await sbFetch('task_overrides?select=*', { method:'GET' });
    if(!Array.isArray(rows)) return;
    rows.forEach(r => {
      if(r.type === 'remove') overrides.removed.add(r.task_id);
      if(r.type === 'move')   overrides.moved[r.task_id] = r.date;
      if(r.type === 'add')    overrides.added.push({
        id: r.id, date: r.date, track: r.track, school: r.school,
        text: r.text, cls: trackToCls(r.track || r.school),
        urgent: r.urgent, milestone: r.milestone, deadline: r.deadline,
        _custom: true, _tab: r.tab
      });
    });
  } catch(e){ console.warn('Supabase load failed:', e); }
}

async function saveOverride(row){
  showSync('Saving...');
  if(!SUPABASE_CONFIGURED){ showSync('Not configured'); return; }
  try {
    await sbFetch('task_overrides', {
      method: 'POST',
      prefer: 'return=minimal',
      body: JSON.stringify(row)
    });
    showSync('Saved ✓');
  } catch(e){ showSync('Save failed'); console.warn(e); }
}

async function deleteOverride(id){
  showSync('Removing...');
  if(!SUPABASE_CONFIGURED){ showSync('Not configured'); return; }
  try {
    await sbFetch(`task_overrides?id=eq.${id}`, { method:'DELETE' });
    showSync('Removed ✓');
  } catch(e){ showSync('Remove failed'); console.warn(e); }
}

function showSync(msg){
  const el = document.getElementById('sync-indicator');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 2000);
}

function trackToCls(track){
  const map = {
    'Decisions':'de','Resume':'re','Recommenders':'rc','Technical':'te',
    'Testing':'ts','Common App':'ca','Financial Aid':'fa','Valley Forge':'vf',
    'School Research':'sr',
    'Common App':'ca','Georgia Tech':'gt','UIUC':'ui','Purdue':'pu',
    'Minnesota':'mn','Wisconsin':'wi','Michigan':'mi','Cornell':'co','MIT':'mt'
  };
  return map[track] || 'de';
}

/* Apply overrides to task arrays */
function applyOverrides(tasks){
  return tasks
    .filter(t => !overrides.removed.has(t.id))
    .map(t => overrides.moved[t.id] ? {...t, date: overrides.moved[t.id]} : t);
}

function getAllTasksWithOverrides(){
  const base = [...overallTasks, ...essayTasks];
  const modified = applyOverrides(base);
  const custom = overrides.added;
  return [...modified, ...custom];
}

let ctxTarget = null; /* {task, calId} */

const ctxMenu = document.getElementById('ctx-menu');

function showCtxMenu(x, y, task, calId){
  ctxTarget = {task, calId};
  ctxMenu.style.display = 'block';
  /* position, keep on screen */
  const mw = 170, mh = 80;
  ctxMenu.style.left = Math.min(x, window.innerWidth - mw - 8) + 'px';

document.addEventListener('DOMContentLoaded', ()=>{

document.getElementById('ctx-move').addEventListener('click', ()=>{
  if(!ctxTarget) return;
  openMoveModal(ctxTarget.task, ctxTarget.calId);
  hideCtxMenu();
});

document.getElementById('ctx-remove').addEventListener('click', async ()=>{
  if(!ctxTarget) return;
  const {task, calId} = ctxTarget;
  hideCtxMenu();
  if(task._custom){
    /* remove custom task */
    overrides.added = overrides.added.filter(t=>t.id!==task.id);
    await deleteOverride(task.id);
  } else {
    /* mark base task as removed */
    overrides.removed.add(task.id);
    await saveOverride({ id:'rm-'+task.id, type:'remove', task_id:task.id });
  }
  reRenderCalendars();
});

const modalOverlay = document.getElementById('edit-modal-overlay');

function openMoveModal(task, calId){
  document.getElementById('modal-title').textContent = 'Move task';
  document.getElementById('modal-date-field').style.display = '';
  document.getElementById('modal-text-field').style.display = 'none';
  document.getElementById('modal-track-field').style.display = 'none';
  document.getElementById('modal-date').value = task.date;
  document.getElementById('modal-confirm').textContent = 'Move';
  modalOverlay.classList.add('open');
  modalOverlay._mode = 'move';
  modalOverlay._task = task;
  modalOverlay._calId = calId;
}

function openAddModal(date, calId){
  document.getElementById('modal-title').textContent = 'Add task';
  document.getElementById('modal-date-field').style.display = '';
  document.getElementById('modal-text-field').style.display = '';
  document.getElementById('modal-track-field').style.display = '';
  document.getElementById('modal-date').value = date;
  document.getElementById('modal-text').value = '';

  /* populate track/school dropdown based on which tab */
  const sel = document.getElementById('modal-track');
  sel.innerHTML = '';
  const isEssay = calId === 'essay-cal';
  const opts = isEssay ? ESSAY_SCHOOLS : OVERALL_TRACKS;
  opts.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    sel.appendChild(opt);
  });
  document.getElementById('modal-confirm').textContent = 'Add';
  modalOverlay.classList.add('open');
  modalOverlay._mode = 'add';
  modalOverlay._date = date;
  modalOverlay._calId = calId;
}

function closeModal(){ modalOverlay.classList.remove('open'); }

document.getElementById('modal-cancel').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if(e.target===modalOverlay) closeModal(); });

document.getElementById('modal-confirm').addEventListener('click', async ()=>{
  const mode = modalOverlay._mode;

  if(mode === 'move'){
    const task = modalOverlay._task;
    const newDate = document.getElementById('modal-date').value;
    if(!newDate) return;
    overrides.moved[task.id] = newDate;
    const rowId = 'mv-'+task.id;
    await saveOverride({ id:rowId, type:'move', task_id:task.id, date:newDate });
    closeModal();
    reRenderCalendars();
  }

  if(mode === 'add'){
    const date  = document.getElementById('modal-date').value;
    const text  = document.getElementById('modal-text').value.trim();
    const track = document.getElementById('modal-track').value;
    const calId = modalOverlay._calId;
    if(!date || !text) return;
    const isEssay = calId === 'essay-cal';
    const newId = 'custom-' + Date.now();
    const newTask = {
      id: newId, date, text, cls: trackToCls(track),
      track: isEssay ? null : track,
      school: isEssay ? track : null,
      urgent: false, milestone: false, deadline: false,
      _custom: true, _tab: isEssay ? 'essay' : 'overall'
    };
    overrides.added.push(newTask);
    await saveOverride({
      id: newId, type:'add', date, text,
      track: isEssay ? null : track,
      school: isEssay ? track : null,
      tab: isEssay ? 'essay' : 'overall'
    });
    closeModal();
    reRenderCalendars();
  }
});

/* ── RE-RENDER with overrides applied ── */
function getTasksForCal(calId){
  const isEssay = calId === 'essay-cal';
  const base = isEssay ? essayTasks : overallTasks;
  const modified = applyOverrides(base);
  const customForTab = overrides.added.filter(t => isEssay ? t._tab==='essay' : t._tab==='overall');
  return [...modified, ...customForTab];
}

function reRenderCalendars(){
  const ovFilter = overallFilter;
  const esFilter = essayFilter;

  /* rebuild task maps with overrides */
  const ovTasks = getTasksForCal('overall-cal');
  const esTasks = getTasksForCal('essay-cal');

  renderCalendar(OVERALL_PHASES, buildTaskMap(ovTasks), OVERALL_BLOCKED, 'track', ovFilter, 'overall-cal');
  renderCalendar(ESSAY_PHASES,   buildTaskMap(esTasks),  ESSAY_BLOCKED,   'school', esFilter, 'essay-cal');

  updateOverallDoneCard();
  updateEssayDoneCard();
  updateGlobalProgress();
}

/* ── PATCH renderCalendar to attach right-click + add button ── */
const _origRenderCalendar = renderCalendar;
renderCalendar = function(phases, taskMap, blocked, filterKey, filterVal, calId){
  _origRenderCalendar(phases, taskMap, blocked, filterKey, filterVal, calId);

  /* attach right-click to every chip */
  document.querySelectorAll(`#${calId} .chip:not(.chip-buf):not(.chip-blk)`).forEach(chip => {
    chip.addEventListener('contextmenu', e => {
      e.preventDefault();
      const taskId = chip.dataset.id;
      const allT = getTasksForCal(calId);
      const task = allT.find(t=>t.id===taskId);
      if(task) showCtxMenu(e.clientX, e.clientY, task, calId);
    });
  });

  /* attach add-task button to every non-blocked day row */
  document.querySelectorAll(`#${calId} .day-row:not(.blocked-row)`).forEach(row => {
    const tc = row.querySelector('.tasks-col');
    const lbl = row.querySelector('.day-lbl');
    if(!tc || !lbl) return;
    const dateStr = lbl.querySelector('.date-str')?.textContent;
    if(!dateStr) return;

    /* parse "Jun 15" back to a full date using the row's position in the phase */
    const parts = dateStr.trim().split(' ');
    if(parts.length < 2) return;
    const monthIdx = MONTHS.indexOf(parts[0]);
    if(monthIdx < 0) return;
    const dayNum = parseInt(parts[1]);
    /* determine year: if month is Jun–Aug it's 2026, Sep–Oct also 2026, Nov+ could be 2026 */
    const year = (monthIdx >= 10) ? 2026 : 2026; /* all our dates are 2026 */
    const fullDate = ds(year, monthIdx+1, dayNum);

    const btn = document.createElement('button');
    btn.className = 'add-task-btn';
    btn.textContent = '+ add';
    btn.title = 'Add a task to this day';
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openAddModal(fullDate, calId);
    });
    tc.appendChild(btn);
  });
};

  const ovT = getTasksForCal('overall-cal');

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function fadeIn(el, dur=700){
  return new Promise(r=>{
    el.style.transition = `opacity ${dur}ms ease, transform ${dur}ms ease`;
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    setTimeout(r, dur);
  });
}

function fadeInOnly(el, dur=700){
  /* fade in opacity only — does not touch transform */
  return new Promise(r=>{
    el.style.transition = `opacity ${dur}ms ease`;
    el.style.opacity = '1';
    setTimeout(r, dur);
  });
}

function fadeOut(el, dur=600){
  return new Promise(r=>{
    el.style.transition = `opacity ${dur}ms ease, transform ${dur}ms ease`;
    el.style.opacity = '0';
    el.style.transform = 'translateY(-20px)';
    setTimeout(r, dur);
  });
}

function fadeOutInPlace(el, dur=600){
  /* fade out opacity only — does not touch transform */
  return new Promise(r=>{
    el.style.transition = `opacity ${dur}ms ease`;
    el.style.opacity = '0';
    setTimeout(r, dur);
  });
}

function fadeOutDown(el, dur=600){
  /* fade out while shifting slightly downward */
  return new Promise(r=>{
    const cur = el.style.transform || '';
    el.style.transition = `opacity ${dur}ms ease, transform ${dur}ms ease`;
    el.style.opacity = '0';
    /* append a downward nudge on top of whatever transform is already set */
    el.style.transform = cur.replace(/translateY\([^)]*\)/,'') + ' translateY(40px)';
    setTimeout(r, dur);
  });
}

function typeText(el, text, speed=65){
  return new Promise(r=>{
    let i=0;
    el.textContent='';
    const t=setInterval(()=>{
      el.textContent+=text[i]; i++;
      if(i>=text.length){ clearInterval(t); setTimeout(r,200); }
    }, speed);
  });
}

/* ── CANVAS BACKGROUND ANIMATIONS ── */
let canvasAnim = null;
let canvasAnimFade = null;

function stopCanvas(){
  if(canvasAnim){ cancelAnimationFrame(canvasAnim); canvasAnim=null; }
  if(canvasAnimFade){ cancelAnimationFrame(canvasAnimFade); canvasAnimFade=null; }
}

/* Draw a single frame of an animation type onto any canvas element */
function makeDrawer(type, color, opt){
  const c = document.createElement('canvas');
  c.width = window.innerWidth;
  c.height = window.innerHeight;
  const ctx = c.getContext('2d');
  let t = 0;

  if(type === 'waves'){
    const alpha = opt || 0.13;
    const waves = [
      {amp:90,  freq:0.0016, speed:0.005, phase:0,   y:c.height*0.15},
      {amp:65,  freq:0.0022, speed:0.009, phase:2.1, y:c.height*0.30},
      {amp:110, freq:0.0011, speed:0.004, phase:4.3, y:c.height*0.46},
      {amp:50,  freq:0.0030, speed:0.013, phase:1.5, y:c.height*0.61},
      {amp:80,  freq:0.0018, speed:0.006, phase:3.8, y:c.height*0.75},
      {amp:40,  freq:0.0038, speed:0.016, phase:0.9, y:c.height*0.88},
    ];
    /* mutable color ref so sweep can tint waves from outside */
    const colorRef = { r:247, g:245, b:240, a:alpha };
    const drawer = { canvas:c, colorRef, tick(){
      ctx.clearRect(0,0,c.width,c.height);
      const stroke = `rgba(${colorRef.r},${colorRef.g},${colorRef.b},${colorRef.a})`;
      waves.forEach(w=>{
        ctx.beginPath();
        for(let x=0;x<=c.width;x+=4){
          const y = w.y + Math.sin(x*w.freq + t*w.speed + w.phase)*w.amp
                        + Math.sin(x*w.freq*1.6 + t*w.speed*0.55 + w.phase+1.2)*w.amp*0.4;
          x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.strokeStyle=stroke; ctx.globalAlpha=1; ctx.lineWidth=1.2; ctx.stroke();
      });
      t++;
    }};
    return drawer;
  }

  if(type === 'embers'){
    const embers = Array.from({length:70},()=>({
      x:Math.random()*c.width, y:c.height+Math.random()*c.height,
      r:1+Math.random()*2.2, vx:(Math.random()-0.5)*0.7, vy:-(0.4+Math.random()*1.1),
      a:0.1+Math.random()*0.35, flicker:Math.random()*Math.PI*2, fspeed:0.04+Math.random()*0.06
    }));
    return { canvas:c, tick(){
      ctx.clearRect(0,0,c.width,c.height);
      embers.forEach(e=>{
        e.x+=e.vx+Math.sin(e.flicker)*0.4; e.y+=e.vy; e.flicker+=e.fspeed;
        if(e.y<-10){ e.y=c.height+10; e.x=Math.random()*c.width; }
        const fl=0.7+Math.sin(e.flicker)*0.3;
        ctx.beginPath(); ctx.arc(e.x,e.y,e.r*fl,0,Math.PI*2);
        ctx.fillStyle=color; ctx.globalAlpha=e.a*fl; ctx.fill();
      });
      t++;
    }};
  }

  if(type === 'particles'){
    const pts = Array.from({length:55},()=>({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:1+Math.random()*2.5, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5,
      a:0.05+Math.random()*0.18
    }));
    return { canvas:c, tick(){
      ctx.clearRect(0,0,c.width,c.height);
      pts.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=c.width; if(p.x>c.width)p.x=0;
        if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=color; ctx.globalAlpha=p.a; ctx.fill();
      });
      pts.forEach((p,i)=>pts.slice(i+1).forEach(q=>{
        const d=Math.hypot(p.x-q.x,p.y-q.y);
        if(d<120){ ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
          ctx.strokeStyle=color; ctx.globalAlpha=(1-d/120)*0.08; ctx.lineWidth=0.8; ctx.stroke(); }
      }));
      t++;
    }};
  }

  if(type === 'rings'){
    const rings = Array.from({length:6},(_,i)=>({
      x:c.width/2, y:c.height/2, r:60+i*80, speed:0.2+i*0.1, t:i*15
    }));
    return { canvas:c, tick(){
      ctx.clearRect(0,0,c.width,c.height);
      rings.forEach(ring=>{
        ring.t++;
        const pulse=Math.sin(ring.t*0.04*ring.speed)*18;
        ctx.beginPath(); ctx.arc(ring.x,ring.y,ring.r+pulse,0,Math.PI*2);
        ctx.strokeStyle=color; ctx.globalAlpha=0.07; ctx.lineWidth=1; ctx.stroke();
      });
      t++;
    }};
  }
}

/* Two visible canvases: main and fade overlay — crossfade between them */
let currentDrawer = null;
let nextDrawer = null;

function runCanvasLoop(){
  const mainC = document.getElementById('splash-canvas');
  const fadeC = document.getElementById('splash-canvas-fade');
  const mainCtx = mainC.getContext('2d');
  const fadeCtx = fadeC.getContext('2d');

  function loop(){
    if(currentDrawer){ currentDrawer.tick(); mainCtx.clearRect(0,0,mainC.width,mainC.height); mainCtx.drawImage(currentDrawer.canvas,0,0); }
    if(nextDrawer){ nextDrawer.tick(); fadeCtx.clearRect(0,0,fadeC.width,fadeC.height); fadeCtx.drawImage(nextDrawer.canvas,0,0); }
    canvasAnim = requestAnimationFrame(loop);
  }
  loop();
}

function fadeCanvas(type, color, opt){
  const mainC = document.getElementById('splash-canvas');
  const fadeC = document.getElementById('splash-canvas-fade');

  if(!currentDrawer){
    mainC.width = window.innerWidth; mainC.height = window.innerHeight;
    fadeC.width = window.innerWidth; fadeC.height = window.innerHeight;
    mainC.style.opacity = '1';
    fadeC.style.opacity = '0';
    currentDrawer = makeDrawer(type, color, opt);
    runCanvasLoop();
    return;
  }

  /* Crossfade: new animation draws on fadeC while mainC fades out */
  fadeC.width = window.innerWidth; fadeC.height = window.innerHeight;
  nextDrawer = makeDrawer(type, color, opt);

  fadeC.style.transition = 'none';
  fadeC.style.opacity = '0';
  void fadeC.offsetWidth;

  mainC.style.transition = 'opacity 1.1s ease';
  fadeC.style.transition = 'opacity 1.1s ease';
  mainC.style.opacity = '0';
  fadeC.style.opacity = '1';

  setTimeout(()=>{
    /* Swap drawers — do NOT reset mainC.width as that clears CSS opacity */
    currentDrawer = nextDrawer;
    nextDrawer = null;
    mainC.style.transition = 'none';
    mainC.style.opacity = '1';
    fadeC.style.transition = 'none';
    fadeC.style.opacity = '0';
    void fadeC.offsetWidth;
    fadeC.style.transition = 'opacity 1.1s ease';
  }, 1200);
}

/* Legacy wrappers kept for call-site compatibility */
function startWaves(c,a){ fadeCanvas('waves',c,a); }
function startEmbers(c){ fadeCanvas('embers',c); }
function startParticles(c){ fadeCanvas('particles',c); }
function startRings(c){ fadeCanvas('rings',c); }

/* Animate wave color: white → teal → white over dur ms */
function sweepWaves(dur=1800, pct=0){
  if(!currentDrawer || !currentDrawer.colorRef) return;
  const ref = currentDrawer.colorRef;

  /* white: 247,245,240   teal: 93,202,165 */
  const startR=247, startG=245, startB=240, startA=ref.a;
  const peakR=93,   peakG=202,  peakB=165;

  /* final resting color — blend toward teal proportional to pct */
  const blend = pct / 100;
  const endR = Math.round(startR + (peakR-startR)*blend);
  const endG = Math.round(startG + (peakG-startG)*blend);
  const endB = Math.round(startB + (peakB-startB)*blend);
  const endA = startA + (0.22 - startA) * blend; /* brighter when more done */

  const start = performance.now();
  function step(now){
    const prog = Math.min((now-start)/dur, 1);
    /* arc up to full teal at midpoint, then ease down to the resting tint */
    const up   = Math.min(prog*2, 1);          /* 0→1 in first half */
    const down = Math.max(prog*2-1, 0);        /* 0→1 in second half */
    const tUp   = 1 - Math.pow(1-up, 2);       /* ease-out up */
    const tDown = Math.pow(down, 2);            /* ease-in down */
    const r = Math.round(startR + (peakR-startR)*tUp  - (peakR-endR)*tDown);
    const g = Math.round(startG + (peakG-startG)*tUp  - (peakG-endG)*tDown);
    const b = Math.round(startB + (peakB-startB)*tUp  - (peakB-endB)*tDown);
    const a = startA  + (0.3 -startA)*tUp    - (0.3 -endA)*tDown;
    ref.r = Math.max(0, Math.min(255, r));
    ref.g = Math.max(0, Math.min(255, g));
    ref.b = Math.max(0, Math.min(255, b));
    ref.a = Math.max(0, a);
    if(prog < 1) requestAnimationFrame(step);
    else { ref.r=endR; ref.g=endG; ref.b=endB; ref.a=endA; }
  }
  requestAnimationFrame(step);
}

  const totalTasks = ALL_TASKS.length;
  const doneTasks  = ALL_TASKS.filter(t=>doneSet.has(t.id)).length;
  const pct        = totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;
  const quote = QUOTES[Math.floor(Math.random()*QUOTES.length)];

  /* PLACEHOLDER DATA */
  const _doneTasks  = 25;
  const _pct        = Math.round(25/totalTasks*100);
  const _todayTasksList = [
    {track:'Decisions', text:'Family convo: ED/REA framework — CMU vs Cornell vs Stanford'},
    {track:'Resume',    text:'Fix Palantir Valley Forge entry on resume'},
    {track:'Technical', text:'Create public GitHub profile with photo + bio'},
  ];
  const _overdueTasks = [];
  const overdueToShow = _overdueTasks;
  const todayTasksList = _todayTasksList;
  /* END PLACEHOLDER */

  /* ── helpers ── */
  function showBlock(id){
    document.querySelectorAll('.sp-block').forEach(b=>b.classList.remove('active'));
    const el = document.getElementById(id);
    el.classList.add('active');
    el.style.opacity = '0';
    void el.offsetWidth;
    el.style.transition = 'opacity 0.7s ease';
    el.style.opacity = '1';
    return el;
  }

  function hideBlock(el, dur=500){
    return new Promise(r=>{
      el.style.transition = `opacity ${dur}ms ease`;
      el.style.opacity = '0';
      setTimeout(()=>{ el.classList.remove('active'); r(); }, dur);
    });
  }

  /* ── STAGE 1: Welcome ── */
  fadeCanvas('waves','rgba(247,245,240,1)',0.10);
  const spWelcome = showBlock('sp-welcome');
  const spWelcomeText = document.getElementById('sp-welcome-text');
  const spNameText    = document.getElementById('sp-name-text');

  /* slide in from slightly below */
  spWelcomeText.style.opacity   = '0';
  spWelcomeText.style.transform = 'translateY(28px)';
  spNameText.style.opacity      = '0';
  spNameText.style.transform    = 'translateY(16px)';
  await wait(600);

  spWelcomeText.style.transition = 'opacity 0.95s ease, transform 0.95s cubic-bezier(0.2,0,0,1)';
  spWelcomeText.style.opacity    = '1';
  spWelcomeText.style.transform  = 'translateY(0)';
  await wait(1100);

  spNameText.style.transition = 'opacity 0.5s ease, transform 0.5s cubic-bezier(0.2,0,0,1)';
  spNameText.style.opacity    = '1';
  spNameText.style.transform  = 'translateY(0)';
  await typeText(spNameText,'Aarush.',70);
  await wait(900);

  /* ── STAGE 2: Progress ── */
  await hideBlock(spWelcome, 500);
  await wait(200);

  const spProgress = showBlock('sp-progress');
  const spProgressText = document.getElementById('sp-progress-text');
  const spBarFill  = document.getElementById('sp-bar-fill');
  const spBarLabel = document.getElementById('sp-bar-label');
  const spBarWrap  = spProgress.querySelector('.sp-bar-wrap');

  spProgressText.style.opacity = '0';
  spBarWrap.style.opacity = '0';

  /* set placeholder text with 0 so count-up can replace it */
  const progressPrefix = _pct >= 50 ? null : `You have `;
  const progressSuffix = _pct >= 50 ? null : ` of ${totalTasks} tasks done.`;
  if(_pct >= 50){
    spProgressText.textContent = `You're ${_pct}% of the way there.`;
  } else {
    spProgressText.textContent = `You have 0 of ${totalTasks} tasks done.`;
  }
  spBarLabel.textContent = `0 of ${totalTasks} tasks complete`;

  await wait(100);
  spProgressText.style.transition = 'opacity 0.75s ease';
  spProgressText.style.opacity = '1';
  await wait(500);
  spBarWrap.style.transition = 'opacity 0.6s ease';
  spBarWrap.style.opacity = '1';
  await wait(300);

  /* animate bar fill + count-up + green sweep simultaneously */
  spBarFill.style.width = _pct + '%';

  /* sweep the wave color teal→white in sync with the bar */
  sweepWaves(1800, _pct);

  /* count-up animation for the number */
  if(_pct < 50){
    const countDur = 1800;
    const countStart = performance.now();
    function countUp(now){
      const elapsed = now - countStart;
      const t = Math.min(elapsed / countDur, 1);
      const eased = 1 - Math.pow(1 - t, 3); /* ease-out cubic */
      const current = Math.round(eased * _doneTasks);
      spProgressText.textContent = `You have ${current} of ${totalTasks} tasks done.`;
      spBarLabel.textContent = `${current} of ${totalTasks} tasks complete`;
      if(t < 1) requestAnimationFrame(countUp);
      else {
        spProgressText.textContent = `You have ${_doneTasks} of ${totalTasks} tasks done.`;
        spBarLabel.textContent = `${_doneTasks} of ${totalTasks} tasks complete`;
      }
    }
    requestAnimationFrame(countUp);
  }

  await wait(2200);
  await hideBlock(spProgress, 500);
  await wait(300);

  /* ── STAGE 3: Overdue ── */
  fadeCanvas('embers', overdueToShow.length === 0 ? '#5DCAA5' : '#F09595');
  const spOverdue      = showBlock('sp-overdue');
  const spOverdueCount = document.getElementById('sp-overdue-count');
  const spOverdueList  = document.getElementById('sp-overdue-list');
  const spCatchup      = document.getElementById('sp-catchup');

  spOverdueCount.style.opacity = '0';
  spOverdueList.style.opacity  = '0';
  spCatchup.style.opacity      = '0';
  spOverdueList.innerHTML = '';

  await wait(400);

  if(overdueToShow.length === 0){
    spOverdueCount.textContent = 'No overdue tasks!';
    spOverdueCount.style.color = '#5DCAA5';
    spCatchup.textContent = "You're fully caught up. That's impressive — keep it going.";
    spOverdueCount.style.transition = 'opacity 0.7s ease';
    spOverdueCount.style.opacity = '1';
    await wait(500);
    spCatchup.style.transition = 'opacity 0.7s ease';
    spCatchup.style.opacity = '1';
  } else {
    spOverdueCount.textContent = `You have ${overdueToShow.length} overdue task${overdueToShow.length>1?'s':''}.`;
    spCatchup.textContent = "Don't fall behind — catch up today! You've got this.";
    const shown = overdueToShow.slice(0,6);
    const extra = overdueToShow.length - shown.length;
    shown.forEach(t=>{
      const item = document.createElement('div');
      item.className = 'sp-task-item overdue-item';
      item.textContent = (t.track||t.school||'') + ' — ' + t.text;
      spOverdueList.appendChild(item);
    });
    if(extra>0){
      const more = document.createElement('div');
      more.className = 'sp-task-item overdue-item';
      more.textContent = `+ ${extra} more...`;
      more.style.opacity = '0.55';
      spOverdueList.appendChild(more);
    }
    spOverdueCount.style.transition = 'opacity 0.7s ease';
    spOverdueCount.style.opacity = '1';
    await wait(400);
    spOverdueList.style.transition = 'opacity 0.5s ease';
    spOverdueList.style.opacity = '1';
    const items = spOverdueList.querySelectorAll('.sp-task-item');
    for(let i=0;i<items.length;i++){
      items[i].style.opacity = '0';
      items[i].style.transform = 'translateX(-14px)';
      items[i].style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      await wait(100);
      items[i].style.opacity = '1';
      items[i].style.transform = 'translateX(0)';
    }
    await wait(400);
    spCatchup.style.transition = 'opacity 0.7s ease';
    spCatchup.style.opacity = '1';
  }
  await wait(2600);
  await hideBlock(spOverdue, 500);
  await wait(300);

  /* ── STAGE 4: Today ── */
  fadeCanvas('particles','#85B7EB');
  const spToday      = showBlock('sp-today');
  const spTodayCount = document.getElementById('sp-today-count');
  const spTodayList  = document.getElementById('sp-today-list');
  const spTodayMsg   = document.getElementById('sp-today-msg');

  spTodayCount.style.opacity = '0';
  spTodayList.style.opacity  = '0';
  spTodayMsg.style.opacity   = '0';
  spTodayList.innerHTML = '';

  await wait(400);

  if(todayTasksList.length === 0){
    spTodayCount.textContent = "You're all done for today!";
    spTodayCount.style.color = '#85B7EB';
    spTodayMsg.textContent = "Take some rest — you've earned it. Or, if you're really feeling it, get ahead.";
    spTodayCount.style.transition = 'opacity 0.7s ease';
    spTodayCount.style.opacity = '1';
    await wait(500);
    spTodayMsg.style.transition = 'opacity 0.7s ease';
    spTodayMsg.style.opacity = '1';
  } else {
    spTodayCount.textContent = `${todayTasksList.length} task${todayTasksList.length>1?'s':''} on your plate today.`;
    spTodayMsg.textContent = "One task at a time. Let's make today count.";
    const shown = todayTasksList.slice(0,6);
    const extra = todayTasksList.length - shown.length;
    shown.forEach(t=>{
      const item = document.createElement('div');
      item.className = 'sp-task-item today-item';
      item.textContent = (t.track||t.school||'') + ' — ' + t.text;
      spTodayList.appendChild(item);
    });
    if(extra>0){
      const more = document.createElement('div');
      more.className = 'sp-task-item today-item';
      more.textContent = `+ ${extra} more today...`;
      more.style.opacity = '0.55';
      spTodayList.appendChild(more);
    }
    spTodayCount.style.transition = 'opacity 0.7s ease';
    spTodayCount.style.opacity = '1';
    await wait(400);
    spTodayList.style.transition = 'opacity 0.5s ease';
    spTodayList.style.opacity = '1';
    const items = spTodayList.querySelectorAll('.sp-task-item');
    for(let i=0;i<items.length;i++){
      items[i].style.opacity = '0';
      items[i].style.transform = 'translateX(-14px)';
      items[i].style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      await wait(100);
      items[i].style.opacity = '1';
      items[i].style.transform = 'translateX(0)';
    }
    await wait(400);
    spTodayMsg.style.transition = 'opacity 0.7s ease';
    spTodayMsg.style.opacity = '1';
  }
  await wait(2600);
  await hideBlock(spToday, 500);
  await wait(300);

  /* ── STAGE 5: Quote ── */
  fadeCanvas('rings','rgba(247,245,240,1)');
  const spQuoteBlock = showBlock('sp-quote');
  const spRemember   = spQuoteBlock.querySelector('.sp-remember');
  const spQuoteText  = document.getElementById('sp-quote-text');

  spRemember.style.opacity  = '0';
  spQuoteText.style.opacity = '0';
  spQuoteText.textContent   = '\u201c' + quote + '\u201d';

  await wait(400);
  spRemember.style.transition = 'opacity 0.7s ease';
  spRemember.style.opacity = '1';
  await wait(500);
  spQuoteText.style.transition = 'opacity 0.9s ease';
  spQuoteText.style.opacity = '1';
  await wait(2800);

  /* ── TRANSITION OUT ── */
  const mainC  = document.getElementById('splash-canvas');
  const fadeC  = document.getElementById('splash-canvas-fade');
  const splash = document.getElementById('splash');
  const header = document.getElementById('main-header');
  const hq     = document.getElementById('header-quote');
  hq.textContent = '\u201c' + quote + '\u201d';

  stopCanvas();
  await Promise.all([
    hideBlock(spQuoteBlock, 500),
    new Promise(r=>{ mainC.style.transition='opacity 0.5s ease'; mainC.style.opacity='0'; fadeC.style.transition='opacity 0.5s ease'; fadeC.style.opacity='0'; setTimeout(r,500); })
  ]);
  await wait(150);

  /* measure header height */
  header.style.visibility = 'visible';
  header.style.opacity = '0';
  header.style.pointerEvents = 'none';
  void header.offsetHeight;
  const headerH = header.offsetHeight || 110;
  header.style.visibility = '';

  /* shrink splash via clip-path */
  splash.style.transition = 'none';
  splash.style.clipPath = 'inset(0 0 0 0)';
  void splash.offsetHeight;
  splash.style.transition = 'clip-path 0.9s cubic-bezier(0.4,0,0.2,1)';
  splash.style.clipPath = `inset(0 0 calc(100% - ${headerH}px) 0)`;
  await wait(950);

  header.style.transition = 'opacity 0.4s ease';
  header.style.opacity = '1';
  header.style.pointerEvents = 'auto';
  await wait(200);

  splash.style.transition = 'opacity 0.35s ease';
  splash.style.opacity = '0';
  await wait(380);
  splash.style.display = 'none';
  document.body.style.overflow = '';

  const main = document.getElementById('main-content');
  main.style.transition = 'opacity 0.5s ease';
  main.style.opacity = '1';
  hq.style.opacity = '1';
  setHeaderOffset();
  setupSidebarObserver();
}



initWithOverrides().then(()=>{
  setupSidebarObserver();
  runSplash();
});

document.getElementById('tab-btn-overall').addEventListener('click', () => switchTab('overall'));
document.getElementById('tab-btn-essays').addEventListener('click',  () => switchTab('essays'));



</script>

      <label>New date</label>
      <input type="date" id="modal-date" />
    </div>

      <label>Task text</label>
      <textarea id="modal-text"></textarea>
    </div>
    <div class="modal-field" id="modal-track-field" style="display:none">
      <label>Track</label>
      <select id="modal-track"></select>
    </div>

      <button class="modal-btn" id="modal-cancel">Cancel</button>
      <button class="modal-btn primary" id="modal-confirm">Save</button>
